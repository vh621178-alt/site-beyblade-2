<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Beyblade X Market</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:#fff;
}

/* NAVBAR */

nav{
background:#111;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid red;
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
cursor:pointer;
font-weight:bold;
}

.menu a:hover{
color:red;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.card{
background:#111;
padding:18px;
border-radius:10px;
text-align:center;
border:1px solid #222;
}

.card img{
width:120px;
margin-bottom:10px;
}

.card:hover{
border:1px solid red;
transform:scale(1.03);
}

/* BUTTON */

button{
padding:10px 14px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#b30000;
}

/* INPUT */

input,select{
padding:10px;
border-radius:6px;
border:none;
background:#111;
color:white;
border:1px solid #333;
margin:5px;
}

/* PRODUCT PAGE */

.produto{
background:#111;
padding:30px;
border-radius:10px;
text-align:center;
}

.produto img{
width:260px;
margin-bottom:20px;
}

.lista{
margin-top:20px;
}

</style>

</head>

<body>

<nav>

<div class="logo">🌀 Liga Beyblade</div>

<div class="menu">

<a onclick="home()">Marketplace</a>
<a onclick="catalogo()">Catálogo</a>
<a onclick="paginaCarrinho()">Carrinho</a>
<a onclick="perfil()">Perfil</a>
<a onclick="vendedor()">Vender</a>

</div>

</nav>

<div class="container" id="pagina"></div>

<script>

/* ======================
CATÁLOGO GRANDE
====================== */

let produtos=[

/* BLADES */

{id:1,nome:"Dran Sword",tipo:"Blade",preco:120,imagem:"imagens/dransword.png"},
{id:2,nome:"Dran Dagger",tipo:"Blade",preco:130,imagem:"imagens/drandagger.png"},
{id:3,nome:"Dran Buster",tipo:"Blade",preco:160,imagem:"imagens/dranbuster.png"},
{id:4,nome:"Phoenix Wing",tipo:"Blade",preco:150,imagem:"imagens/phoenixwing.png"},
{id:5,nome:"Wizard Rod",tipo:"Blade",preco:170,imagem:"imagens/wizardrod.png"},
{id:6,nome:"Hells Scythe",tipo:"Blade",preco:140,imagem:"imagens/hellsscythe.png"},
{id:7,nome:"Knight Shield",tipo:"Blade",preco:130,imagem:"imagens/knightshield.png"},
{id:8,nome:"Leon Claw",tipo:"Blade",preco:130,imagem:"imagens/leonclaw.png"},
{id:9,nome:"Shark Edge",tipo:"Blade",preco:150,imagem:"imagens/sharkedge.png"},
{id:10,nome:"Rhino Horn",tipo:"Blade",preco:130,imagem:"imagens/rhinohorn.png"},
{id:11,nome:"Viper Tail",tipo:"Blade",preco:130,imagem:"imagens/vipertail.png"},
{id:12,nome:"Cobalt Dragoon",tipo:"Blade",preco:180,imagem:"imagens/cobaltdragoon.png"},

/* RATCHETS */

{id:20,nome:"3-60",tipo:"Ratchet",preco:40,imagem:""},
{id:21,nome:"4-60",tipo:"Ratchet",preco:40,imagem:""},
{id:22,nome:"5-60",tipo:"Ratchet",preco:45,imagem:""},
{id:23,nome:"7-60",tipo:"Ratchet",preco:45,imagem:""},
{id:24,nome:"9-60",tipo:"Ratchet",preco:50,imagem:""},

/* BITS */

{id:30,nome:"Flat",tipo:"Bit",preco:35,imagem:""},
{id:31,nome:"Rush",tipo:"Bit",preco:40,imagem:""},
{id:32,nome:"Ball",tipo:"Bit",preco:35,imagem:""},
{id:33,nome:"Taper",tipo:"Bit",preco:35,imagem:""},
{id:34,nome:"Needle",tipo:"Bit",preco:35,imagem:""}

]

let carrinho=[]

/* ======================
HOME
====================== */

function home(){

let html="<h2>Produtos em destaque</h2><div class='grid'>"

produtos.slice(0,8).forEach(p=>{

html+=card(p)

})

html+="</div>"

pagina.innerHTML=html

}

/* ======================
CARD
====================== */

function card(p){

return `

<div class="card">

<img src="${p.imagem}">

<h3>${p.nome}</h3>

<p>${p.tipo}</p>

<p>R$ ${p.preco}</p>

<button onclick="verProduto(${p.id})">
Ver peça
</button>

</div>

`

}

/* ======================
CATÁLOGO
====================== */

function catalogo(){

let html=`

<h2>Catálogo de Peças</h2>

<input id="busca" placeholder="Buscar peça..." onkeyup="buscar()">

<select id="tipo" onchange="buscar()">
<option value="">Tipo</option>
<option value="Blade">Blade</option>
<option value="Ratchet">Ratchet</option>
<option value="Bit">Bit</option>
</select>

<div class="grid" id="lista"></div>

`

pagina.innerHTML=html

render(produtos)

}

function render(lista){

let div=document.getElementById("lista")

div.innerHTML=""

lista.forEach(p=>{

div.innerHTML+=card(p)

})

}

function buscar(){

let texto=document.getElementById("busca").value.toLowerCase()
let tipo=document.getElementById("tipo").value

let resultado=produtos.filter(p=>

p.nome.toLowerCase().includes(texto)
&& (tipo=="" || p.tipo==tipo)

)

render(resultado)

}

/* ======================
PÁGINA PRODUTO
====================== */

function verProduto(id){

let p=produtos.find(x=>x.id==id)

pagina.innerHTML=`

<div class="produto">

<img src="${p.imagem}">

<h1>${p.nome}</h1>

<p>Tipo: ${p.tipo}</p>

<h2>R$ ${p.preco}</h2>

<button onclick="addCarrinho(${p.id})">
Adicionar ao carrinho
</button>

</div>

`

}

/* ======================
CARRINHO
====================== */

function addCarrinho(id){

let p=produtos.find(x=>x.id==id)

carrinho.push(p)

alert("Produto adicionado!")

}

function paginaCarrinho(){

let html="<h2>Seu carrinho</h2>"

let total=0

carrinho.forEach(p=>{

html+=`<p>${p.nome} - R$ ${p.preco}</p>`
total+=p.preco

})

html+=`

<h3>Total: R$ ${total}</h3>

<button onclick="checkout()">Finalizar compra</button>

`

pagina.innerHTML=html

}

function checkout(){

alert("Pagamento processado!")

carrinho=[]

home()

}

/* ======================
PERFIL
====================== */

function perfil(){

pagina.innerHTML=`

<h2>Perfil do usuário</h2>

<input placeholder="Nome">

<input placeholder="Email">

<button>Salvar</button>

`

}

/* ======================
VENDEDOR
====================== */

function vendedor(){

pagina.innerHTML=`

<h2>Área do vendedor</h2>

<input id="nome" placeholder="Nome do produto">

<input id="preco" placeholder="Preço">

<select id="tipo">
<option>Blade</option>
<option>Ratchet</option>
<option>Bit</option>
</select>

<button onclick="cadastrar()">Cadastrar produto</button>

`

}

function cadastrar(){

let nome=document.getElementById("nome").value
let preco=document.getElementById("preco").value
let tipo=document.getElementById("tipo").value

produtos.push({

id:produtos.length+1,
nome:nome,
preco:preco,
tipo:tipo,
imagem:""

})

alert("Produto cadastrado!")

home()

}

/* START */

home()

</script>

</body>
</html>

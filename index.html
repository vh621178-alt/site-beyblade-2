<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #8b0000;
            --bg-black: #050505;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container Principal */
        .banner-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 400px;
            background: radial-gradient(circle at center, #1a0000 0%, var(--bg-black) 100%);
            border: 2px solid var(--primary-red);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }

        /* Efeito de Grade de Fundo */
        .banner-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Beyblade Girando (Visual) */
        .spinner {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 2px solid rgba(255, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 2px solid var(--primary-red);
            animation: rotate 4s linear infinite;
            opacity: 0.4;
            z-index: 1;
        }

        .spinner-inner {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 1px dashed var(--primary-red);
            border-radius: 50%;
            animation: rotate-reverse 8s linear infinite;
        }

        /* Texto do Banner */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            text-transform: uppercase;
        }

        .coming-soon {
            font-size: 1.2rem;
            color: var(--primary-red);
            letter-spacing: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            display: block;
            text-shadow: 0 0 10px var(--primary-red);
            animation: pulse 2s infinite;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-white);
            margin: 0;
            line-height: 1;
            text-shadow: 4px 4px 0px var(--dark-red);
        }

        .subtitle {
            font-size: 1.5rem;
            color: #ccc;
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .highlight {
            color: var(--primary-red);
            font-weight: bold;
        }

        /* Animações */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .main-title { font-size: 2.5rem; }
            .subtitle { font-size: 1rem; }
            .banner-container { height: 300px; margin: 20px; }
        }
    </style>
    <title>Banner Beyblade Marketplace</title>
</head>
<body>

    <div class="banner-container">
        <div class="spinner"></div>
        <div class="spinner-inner"></div>

        <div class="content">
            <span class="coming-soon">EM BREVE</span>
            <h1 class="main-title">O MAIOR MARKETPLACE</h1>
            <p class="subtitle">DE <span class="highlight">BEYBLADE</span> DO BRASIL</p>
        </div>
    </div>

</body>
</html>
